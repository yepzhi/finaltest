<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIIP NextGEN | STEM Diagnostic Test</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Welcome Screen -->
        <section id="welcome" class="screen active">
            <div class="glass-card main-card">
                <div class="header">
                    <div class="badge">NextGEN Diagnostic</div>
                    <h1>SIIP NextGEN <span class="highlight">STEM Test</span></h1>
                    <p class="subtitle">Evaluación de competencias científicas basada en estándares internacionales PISA.</p>
                </div>
                
                <div class="intro-stats">
                    <div class="stat-item">
                        <span class="stat-val">80</span>
                        <span class="stat-label">Puntos Totales</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-val">70+</span>
                        <span class="stat-label">Preguntas</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-val">PISA</span>
                        <span class="stat-label">Estándar</span>
                    </div>
                </div>

                <div class="user-info">
                    <input type="email" id="userEmail" placeholder="Introduce tu correo electrónico para comenzar" required>
                </div>

                <button id="startBtn" class="btn btn-primary">Iniciar Diagnóstico</button>
            </div>
        </section>

        <!-- Quiz Screen -->
        <section id="quiz" class="screen">
            <div class="progress-container">
                <div class="progress-bar-bg">
                    <div id="progressBar" class="progress-bar-fill"></div>
                </div>
                <div class="progress-text">
                    <span id="currentQuestionNum">1</span> / <span id="totalQuestionsNum">80</span>
                </div>
            </div>

            <div class="glass-card quiz-card">
                <div id="categoryBadge" class="badge">Categoría</div>
                <h2 id="questionText">¿Pregunta?</h2>
                
                <div id="optionsContainer" class="options-grid">
                    <!-- Options injected here -->
                </div>

                <div class="quiz-footer">
                    <button id="prevBtn" class="btn btn-secondary" disabled>Anterior</button>
                    <button id="nextBtn" class="btn btn-primary" disabled>Siguiente</button>
                </div>
            </div>
        </section>

        <!-- Results Screen -->
        <section id="results" class="screen">
            <div class="glass-card results-card">
                <div class="badge">Diagnóstico Completado</div>
                <h1>Tu Nivel de <span class="highlight">Competencia STEM</span></h1>
                
                <div class="score-display">
                    <div class="score-circle">
                        <span id="finalScore">0</span>
                        <span class="score-total">/ 80</span>
                    </div>
                    <h2 id="levelLabel">Nivel Avanzado</h2>
                </div>

                <div id="categoryResults" class="category-breakdown">
                    <!-- Category bars injected here -->
                </div>

                <button id="retryBtn" class="btn btn-secondary">Reiniciar Test</button>
            </div>
        </section>
    </div>

    <!-- Background Elements -->
    <div class="bg-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
